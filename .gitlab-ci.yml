include:
  - project: 'shared/strix-ci-template'
    file: 'strix-scan.yml'

strix-scan-quick:
  stage: Test
strix-scan-standard:
  stage: Test
strix-scan-mr-diff:
  stage: Test

stages:
  - Build
  - Test
  - Artifact Links

variables:
  BUILD_WIN: 'y'
  BUILD_MAC: 'y'
  BUILD_LINUX: 'y'
  BUILD_IOS: 'y'
  BUILD_ANDROID: 'y'
  NIGHTLY_TEST_BUILD: 'n'
  GIT_DEPTH: 0 # Full clone required to reach git tags for version detection
  VCPKG_ROOT_WINDOWS: 'c:\vcpkg'

.template_win10_build: &template_win10_build
  tags: [win10qty6]
  before_script:
    - $env:VCPKG_ROOT = $env:VCPKG_ROOT_WINDOWS
    - $env:VCPKG_CA_BUNDLE = "$(Get-Location)\tools\cacert.pem"
    - $env:VCPKG_BINARY_SOURCES = "clear;http,https://${env:NEXUS_USERNAME}:${env:NEXUS_PASSWORD}@nexus.int.windscribe.com/repository/client-desktop/client-desktop/vcpkg_cache/current/binary_cache/{sha}.zip,readwrite"
    - $env:VCPKG_INSTALL_OPTIONS = "--clean-after-build"
    - if (Test-Path ws-vcpkg-registry) { Remove-Item -Recurse -Force ws-vcpkg-registry }
    - git clone https://github.com/Windscribe/ws-vcpkg-registry.git
    - .\ws-vcpkg-registry\install-vcpkg\vcpkg_install.bat $env:VCPKG_ROOT_WINDOWS --configure-git
  interruptible: true

.template_mac_build: &template_mac_build
  tags: [macos-arm64-qt6]
  before_script:
    - export VCPKG_ROOT="${HOME}/vcpkg"
    - export VCPKG_INSTALL_OPTIONS="--clean-after-build"
    - export VCPKG_CA_BUNDLE="$(pwd)/tools/cacert.pem"
    - export VCPKG_BINARY_SOURCES="clear;http,https://${NEXUS_USERNAME}:${NEXUS_PASSWORD}@nexus.int.windscribe.com/repository/client-desktop/client-desktop/vcpkg_cache/current/binary_cache/{sha}.zip,readwrite"
    - rm -rf ws-vcpkg-registry
    - git clone https://github.com/Windscribe/ws-vcpkg-registry.git
    - ./ws-vcpkg-registry/install-vcpkg/vcpkg_install.sh "${VCPKG_ROOT}" --configure-git
  interruptible: true

.template_rhel_build: &template_rhel_build
  image: registry.gitlab.int.windscribe.com:5005/ws/client/desktop/client-desktop/fedora36
  before_script:
    - export VCPKG_ROOT="${HOME}/vcpkg"
    - export VCPKG_INSTALL_OPTIONS="--clean-after-build"
    - export VCPKG_CA_BUNDLE="$(pwd)/tools/cacert.pem"
    - export VCPKG_BINARY_SOURCES="clear;http,https://${NEXUS_USERNAME}:${NEXUS_PASSWORD}@nexus.int.windscribe.com/repository/client-desktop/client-desktop/vcpkg_cache/current/binary_cache/{sha}.zip,readwrite"
    - rm -rf ws-vcpkg-registry
    - git clone https://github.com/Windscribe/ws-vcpkg-registry.git
    - ./ws-vcpkg-registry/install-vcpkg/vcpkg_install.sh "${VCPKG_ROOT}" --configure-git
  interruptible: true


build:wsnet:win:
  <<: *template_win10_build
  stage: Build
  variables:
    GIT_STRATEGY: clone
  script:
    - cmake -B build -S .
      -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
      -DVCPKG_TARGET_TRIPLET=ws-x64-windows-static-release
      -DVCPKG_HOST_TRIPLET=ws-x64-windows-static-release
    - cmake --build build --config Release --parallel
  rules:
    - if: $BUILD_WIN == "y" && $CI_PIPELINE_SOURCE == "push"
  artifacts:
    expire_in: 1 day
    paths:
      - build/

build:wsnet:mac:
  <<: *template_mac_build
  stage: Build
  variables:
    GIT_STRATEGY: clone
  script:
    - cmake -B build -S .
      -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
      -DVCPKG_TARGET_TRIPLET=ws-universal-osx
      "-DCMAKE_CXX_CLANG_TIDY=clang-tidy;--checks=clang-analyzer-*,-clang-analyzer-optin.cplusplus.VirtualCall,-clang-diagnostic-deprecated-declarations,-clang-analyzer-osx.cocoa.RetainCount,-clang-analyzer-nullability.NullablePassedToNonnull;--header-filter=.*/src/.*;--exclude-header-filter=.*vcpkg/.*;--warnings-as-errors=*"
    - cmake --build build --parallel
  artifacts:
    expire_in: 1 day
    paths:
      - build/
  rules:
    - if: $BUILD_MAC == "y" && $CI_PIPELINE_SOURCE == "push"

build:wsnet:rhel:
  <<: *template_rhel_build
  stage: Build
  variables:
    GIT_STRATEGY: clone
  script:
    - python3 -m pip install clang-tidy
    - cmake -B build -S .
      -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
      -DVCPKG_TARGET_TRIPLET=ws-x64-linux
      "-DCMAKE_CXX_CLANG_TIDY=clang-tidy;--checks=clang-analyzer-*,-clang-analyzer-optin.cplusplus.VirtualCall,-clang-diagnostic-deprecated-declarations;--header-filter=.*/src/.*;--exclude-header-filter=.*vcpkg/.*;--warnings-as-errors=*"
    - cmake --build build --parallel

  artifacts:
    expire_in: 1 day
    paths:
      - build/
  rules:
    - if: $BUILD_LINUX == "y" && $CI_PIPELINE_SOURCE == "push"

test:wsnet:win:
  <<: *template_win10_build
  stage: Test
  needs: []
  variables:
    GIT_STRATEGY: clone
  script:
    - cmake -B build -S .
      -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
      -DVCPKG_TARGET_TRIPLET=ws-x64-windows-static-release
      -DVCPKG_HOST_TRIPLET=ws-x64-windows-static-release
      -DIS_BUILD_TESTS=ON
    - cmake --build build --config Release --parallel
    - python -m pip install pproxy
    - |
      $ok = $false
      for ($i = 1; $i -le 3; $i++) {
        Write-Host "=== Test attempt $i ==="
        $proxyStarted = $false
        $pp = $null
        $proxyPort = $null
        for ($proxyAttempt = 1; $proxyAttempt -le 3; $proxyAttempt++) {
          $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Parse("127.0.0.1"), 0)
          $listener.Start()
          $proxyPort = $listener.LocalEndpoint.Port
          $listener.Stop()
          $pp = Start-Process -NoNewWindow -PassThru python -ArgumentList "-m","pproxy","-l","http://127.0.0.1:$proxyPort"
          Start-Sleep -Seconds 1
          if (-not $pp.HasExited) {
            $proxyStarted = $true
            break
          }
          Write-Host "pproxy startup attempt $proxyAttempt failed on 127.0.0.1:$proxyPort"
        }
        if (-not $proxyStarted) { exit 1 }
        $env:WSNET_TEST_HTTP_PROXY_PORT = "$proxyPort"
        & build/test/Release/wsnet_test.exe --gtest_output=xml:report_win.xml
        $code = $LASTEXITCODE
        Remove-Item Env:WSNET_TEST_HTTP_PROXY_PORT -ErrorAction SilentlyContinue
        if ($pp -and -not $pp.HasExited) { Stop-Process -Id $pp.Id -Force -ErrorAction SilentlyContinue }
        if ($code -eq 0) { $ok = $true; break }
        if ($i -lt 3) {
          Write-Host "Waiting 60 seconds before retry..."
          Start-Sleep -Seconds 60
        }
      }
      if (-not $ok) { exit 1 }
  after_script:
    - if ($env:WSNET_TEST_HTTP_PROXY_PORT) { Remove-Item Env:WSNET_TEST_HTTP_PROXY_PORT -ErrorAction SilentlyContinue }; $true
  rules:
    - if: $BUILD_WIN == "y" && $NIGHTLY_TEST_BUILD == "y"
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - report_win.xml
    reports:
      junit: report_win.xml

test:wsnet:mac:
  <<: *template_mac_build
  stage: Test
  needs:
    - job: test:wsnet:win
      optional: true
  script:
    - cmake -B build -S .
      -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
      -DVCPKG_TARGET_TRIPLET=ws-universal-osx
      -DIS_BUILD_TESTS=ON
      -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage"
      -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage"
      "-DCMAKE_CXX_CLANG_TIDY=clang-tidy;--checks=clang-analyzer-*,-clang-analyzer-optin.cplusplus.VirtualCall,-clang-diagnostic-deprecated-declarations,-clang-analyzer-osx.cocoa.RetainCount,-clang-analyzer-nullability.NullablePassedToNonnull;--header-filter=.*/src/.*;--exclude-header-filter=.*vcpkg/.*;--warnings-as-errors=*"
    - cmake --build build --parallel
    - /usr/bin/python3 -m pip install pproxy
    - pip3 install gcovr
    - set +o pipefail
    - |
      FAILED=1
      PPROXY_PID=""
      cleanup_proxy() {
        if [ -n "${PPROXY_PID:-}" ]; then
          kill "${PPROXY_PID}" 2>/dev/null || true
          wait "${PPROXY_PID}" 2>/dev/null || true
          PPROXY_PID=""
        fi
      }
      trap cleanup_proxy EXIT
      for attempt in 1 2 3; do
        echo "=== Test attempt $attempt ==="
        PROXY_STARTED=0
        for proxy_attempt in 1 2 3; do
          PROXY_PORT=$(/usr/bin/python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1]); s.close()')
          /usr/bin/python3 -m pproxy -l "http://127.0.0.1:${PROXY_PORT}" &
          PPROXY_PID=$!
          sleep 1
          if kill -0 "${PPROXY_PID}" 2>/dev/null; then
            PROXY_STARTED=1
            break
          fi
          echo "pproxy startup attempt ${proxy_attempt} failed on 127.0.0.1:${PROXY_PORT}"
          cleanup_proxy
        done
        if [ "${PROXY_STARTED}" -ne 1 ]; then exit 1; fi
        if WSNET_TEST_HTTP_PROXY_PORT="${PROXY_PORT}" build/test/wsnet_test --gtest_output=xml:report_macos.xml; then
          cleanup_proxy
          FAILED=0
          break
        fi
        cleanup_proxy
        if [ "${attempt}" -lt 3 ]; then
          echo "Waiting 60 seconds before retry..."
          sleep 60
        fi
      done
      [ $FAILED -eq 0 ]
  coverage: /^\s*lines:\s*\d+.\d+\%/
  after_script:
    - python3 -m gcovr --xml-pretty --exclude-unreachable-branches --print-summary --gcov-ignore-parse-errors=negative_hits.warn -o coverage.xml --root ${CI_PROJECT_DIR} --filter src/ --exclude src/private/tests/
  rules:
    - if: $BUILD_MAC == "y" && $NIGHTLY_TEST_BUILD == "y"
  artifacts:
    when: always
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}-mac
    expire_in: 1 day
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: report_macos.xml
    paths:
      - report_macos.xml

