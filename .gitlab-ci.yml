stages:
  - Build
  - Test
  - Artifact Links

variables:
  BUILD_WIN: 'y'
  BUILD_MAC: 'y'
  BUILD_LINUX: 'y'
  BUILD_IOS: 'y'
  BUILD_ANDROID: 'y'
  NIGHTLY_TEST_BUILD: 'n'
  GIT_DEPTH: 0 # Full clone required to reach git tags for version detection
  VCPKG_ROOT_WINDOWS: 'c:\vcpkg'
  VCPKG_DEFAULT_BINARY_CACHE_WINDOWS: 'c:\vcpkg_cache'

.template_win10_build: &template_win10_build
  tags: [win10qty6]
  before_script:
    - $env:VCPKG_ROOT = $env:VCPKG_ROOT_WINDOWS
    - $env:VCPKG_DEFAULT_BINARY_CACHE = $env:VCPKG_DEFAULT_BINARY_CACHE_WINDOWS
    - $env:VCPKG_INSTALL_OPTIONS = "--clean-after-build"
    - if (Test-Path ws-vcpkg-registry) { Remove-Item -Recurse -Force ws-vcpkg-registry }
    - git clone https://github.com/Windscribe/ws-vcpkg-registry.git
    - .\ws-vcpkg-registry\install-vcpkg\vcpkg_install.bat $env:VCPKG_ROOT_WINDOWS --configure-git
  interruptible: true

.template_mac_build: &template_mac_build
  tags: [macos-arm64-qt6]
  before_script:
    - export VCPKG_ROOT="${HOME}/vcpkg"
    - export VCPKG_INSTALL_OPTIONS="--clean-after-build"
    - rm -rf ws-vcpkg-registry
    - git clone https://github.com/Windscribe/ws-vcpkg-registry.git
    - ./ws-vcpkg-registry/install-vcpkg/vcpkg_install.sh "${VCPKG_ROOT}" --configure-git
  interruptible: true

.template_rhel_build: &template_rhel_build
  image: registry.gitlab.int.windscribe.com:5005/ws/client/desktop/client-desktop/fedora36
  before_script:
    - export VCPKG_ROOT="${HOME}/vcpkg"
    - export VCPKG_INSTALL_OPTIONS="--clean-after-build"
    - export VCPKG_BINARY_SOURCES="clear;http,https://${NEXUS_USERNAME}:${NEXUS_PASSWORD}@nexus.int.windscribe.com/repository/client-desktop/client-desktop/vcpkg_cache/current/binary_cache/{sha}.zip,readwrite"
    - rm -rf ws-vcpkg-registry
    - git clone https://github.com/Windscribe/ws-vcpkg-registry.git
    - ./ws-vcpkg-registry/install-vcpkg/vcpkg_install.sh "${VCPKG_ROOT}" --configure-git
  interruptible: true


build:wsnet:win:
  <<: *template_win10_build
  stage: Build
  variables:
    GIT_STRATEGY: clone
  script:
    - cmake -B build -S .
      -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
      -DVCPKG_TARGET_TRIPLET=ws-x64-windows-static-release
      -DVCPKG_HOST_TRIPLET=ws-x64-windows-static-release
      -DIS_BUILD_TESTS=ON
    - cmake --build build --config Release --parallel
  rules:
    - if: $BUILD_WIN == "y" && $NIGHTLY_TEST_BUILD == "y"
    - if: $BUILD_WIN == "y" && $CI_PIPELINE_SOURCE == "push"
  artifacts:
    expire_in: 1 day
    paths:
      - build/

build:wsnet:mac:
  <<: *template_mac_build
  stage: Build
  variables:
    GIT_STRATEGY: clone
  script:
    - cmake -B build -S .
      -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
      -DVCPKG_TARGET_TRIPLET=ws-universal-osx
      -DIS_BUILD_TESTS=ON
      -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage"
      -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage"
      "-DCMAKE_CXX_CLANG_TIDY=clang-tidy;--checks=clang-analyzer-*,-clang-analyzer-optin.cplusplus.VirtualCall,-clang-diagnostic-deprecated-declarations,-clang-analyzer-osx.cocoa.RetainCount,-clang-analyzer-nullability.NullablePassedToNonnull;--header-filter=.*/src/.*;--exclude-header-filter=.*vcpkg/.*;--warnings-as-errors=*"
    - cmake --build build --parallel
  artifacts:
    expire_in: 1 day
    paths:
      - build/
  rules:
    - if: $BUILD_MAC == "y" && $NIGHTLY_TEST_BUILD == "y"
    - if: $BUILD_MAC == "y" && $CI_PIPELINE_SOURCE == "push"

build:wsnet:rhel:
  <<: *template_rhel_build
  stage: Build
  variables:
    GIT_STRATEGY: clone
  script:
    - python3 -m pip install clang-tidy
    - cmake -B build -S .
      -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
      -DVCPKG_TARGET_TRIPLET=ws-x64-linux
      -DIS_BUILD_TESTS=ON
      -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage"
      -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage"
      "-DCMAKE_CXX_CLANG_TIDY=clang-tidy;--checks=clang-analyzer-*,-clang-analyzer-optin.cplusplus.VirtualCall,-clang-diagnostic-deprecated-declarations;--header-filter=.*/src/.*;--exclude-header-filter=.*vcpkg/.*;--warnings-as-errors=*"
    - cmake --build build --parallel

  artifacts:
    expire_in: 1 day
    paths:
      - build/
  rules:
    - if: $BUILD_LINUX == "y" && $NIGHTLY_TEST_BUILD == "y"
    - if: $BUILD_LINUX == "y" &&$CI_PIPELINE_SOURCE == "push"

test:wsnet:win:
  <<: *template_win10_build
  stage: Test
  variables:
    GIT_STRATEGY: clone
  script:
    - pip3 install pproxy
    - Start-Process -NoNewWindow -PassThru pproxy
    - |
      $testExitCode = 0
      try {
        & build/test/Release/wsnet_test.exe --gtest_output=xml:report_win.xml
        $testExitCode = $LASTEXITCODE
      } finally {
        Get-Process "pproxy" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
      }
      if ($testExitCode -ne 0) { exit $testExitCode }
  after_script:
    - Get-Process "pproxy" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue; $true
  retry: 2
  needs:
    - job: build:wsnet:win
      optional: true
      artifacts: true
  rules:
    - if: $BUILD_WIN == "y" && $NIGHTLY_TEST_BUILD == "y"
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - report_win.xml
    reports:
      junit: report_win.xml

test:wsnet:mac:
  <<: *template_mac_build
  stage: Test
  script:
    - pip3 install pproxy gcovr
    - install_name_tool -add_rpath "${CI_PROJECT_DIR}/build" build/test/wsnet_test || true
    - set +o pipefail
    - if [ "$(ps aux | grep -c [p]proxy)" -ne 0 ]; then ps aux | grep [p]proxy | awk '{print $2}' | xargs kill -9; fi
    - python3 -m pproxy &
    - build/test/wsnet_test --gtest_output=xml:report_macos.xml || FAILED=1
    - kill %1
    - if [ $FAILED ]; then exit 1; fi
  coverage: /^\s*lines:\s*\d+.\d+\%/
  after_script:
    - python3 -m gcovr --xml-pretty --exclude-unreachable-branches --print-summary --gcov-ignore-parse-errors=negative_hits.warn -o coverage.xml --root ${CI_PROJECT_DIR} --filter src/ --exclude src/private/tests/
  retry: 2
  needs:
    - job: build:wsnet:mac
      optional: true
      artifacts: true
  rules:
    - if: $BUILD_MAC == "y" && $NIGHTLY_TEST_BUILD == "y"
  artifacts:
    when: always
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}-mac
    expire_in: 1 day
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: report_macos.xml
    paths:
      - report_macos.xml

test:wsnet:rhel:
  <<: *template_rhel_build
  stage: Test
  script:
    - pip3 install pproxy gcovr
    - export LD_LIBRARY_PATH="${CI_PROJECT_DIR}/build:${LD_LIBRARY_PATH}"
    - set +o pipefail
    - if [ "$(ps aux | grep -c [p]proxy)" -ne 0 ]; then ps aux | grep [p]proxy | awk '{print $2}' | xargs kill -9; fi
    - python3 -m pproxy &
    - build/test/wsnet_test --gtest_output=xml:report_linux.xml || FAILED=1
    - kill %1
    - if [ $FAILED ]; then exit 1; fi
  coverage: /^\s*lines:\s*\d+.\d+\%/
  after_script:
    - python3 -m gcovr --xml-pretty --exclude-unreachable-branches --print-summary --gcov-ignore-parse-errors=negative_hits.warn -o coverage.xml --root ${CI_PROJECT_DIR} --filter src/ --exclude src/private/tests/
  retry: 2
  needs:
    - job: build:wsnet:rhel
      optional: true
      artifacts: true
  rules:
    - if: $BUILD_LINUX == "y" && $NIGHTLY_TEST_BUILD == "y"
  artifacts:
    when: always
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}-linux
    expire_in: 1 day
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: report_linux.xml
    paths:
      - report_linux.xml

build:wsnet:ios:
  <<: *template_mac_build
  stage: Build
  tags: [macos-arm64-qt6]
  script:
    - cd ./tools
    - ./build_ios.sh &> /dev/null
    - ls -lh ./build/WSNet.xcframework
    - cd ./build
    - zip -r WSNet.xcframework.zip WSNet.xcframework
  artifacts:
    name: "WSNet_iOS_${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./tools/build/WSNet.xcframework.zip
    expire_in: 1 week
  rules:
    - if: $BUILD_IOS == "y" && ($NIGHTLY_TEST_BUILD == "y" || $CI_PIPELINE_SOURCE == "push")


build:wsnet:android:
  <<: *template_rhel_build
  stage: Build
  script:
    # Install dependencies.
    - dnf install -y java-17-openjdk java-17-openjdk-devel zip unzip wget cmake ninja-build git gcc-c++ make
    # Setup Java
    - echo "Setting up Java..."
    - export JAVA_HOME=/usr/lib/jvm/java-17
    - export PATH=$JAVA_HOME/bin:$PATH
    # Setup NDK
    - mkdir -p /opt/android-ndk
    - wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
    - unzip -q ndk.zip -d /opt/android-ndk
    - export ANDROID_NDK_HOME=/opt/android-ndk/android-ndk-r25b
    - export PATH=$ANDROID_NDK_HOME:$PATH
    - $ANDROID_NDK_HOME/ndk-build --version || true
    # Build .aar
    - cd ./tools
    - ./build_android.sh &> /dev/null
    - zip -r WSNet.aar.zip wsnet.aar
  artifacts:
    name: "WSNet_Android_${CI_COMMIT_SHORT_SHA}"
    paths:
      - ./tools/WSNet.aar.zip
    expire_in: 1 week
  rules:
    - if: $BUILD_ANDROID == "y" && ($NIGHTLY_TEST_BUILD == "y" || $CI_PIPELINE_SOURCE == "push")
